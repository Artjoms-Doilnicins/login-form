<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Login Form</title>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<div class="container-wrapper">
			<div class="container">
				<h1>Login</h1>
				<div class="username input-design">
					<input class="username-input" type="text" placeholder="Username" />
					<img class="user-icon" src="img/user.svg" alt="user-icon" />
				</div>
				<div class="password input-design">
					<input class="password-input" type="password" placeholder="Password" />
					<img class="password-icon" src="img/password.svg" alt="password-icon" />
				</div>
				<div class="section-2">
					<div class="forgot-pwd-section">
						<div class="remember-me-wrapper">
							<input type="checkbox" />
							<span>Remember me</span>
						</div>
						<a href="google.com">Forgot Password?</a>
					</div>
					<button class="login-btn">Login</button>
					<p class="no-account">Don't have an account? <a href="google.com">Register</a></p>
				</div>
			</div>
		</div>
	</body>
</html>
